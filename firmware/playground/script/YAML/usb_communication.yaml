# Version: 0.1.0

#---------------------------------- Headers -----------------------------------#
- Headers:
    COMMAND: 0xFF

#---------------------------------- ENUMS -----------------------------------#
- Enums: 
    ErrorCodes:
      0: NoError
      1: OpCodeNotFound
      2: NonFiniteFloat
      3: ReadByteError
      4: InvalidLedId
      
#---------------------------------- COMMAND -----------------------------------#

# /*
#     Command Format                  --> [HEADER: u8]    [OP_CODE:u8]    [PARAMETER]
#         1. Turn on Onboard LED      --> [0xFF]          [0x01]          [LED_ID: i32]
#         2. Turn off Onboard LED     --> [0xFF]          [0x02]          [LED_ID: i32]
#         3. Get Onboard LED state    --> [0xFF]          [0x03]          [LED_ID: i32]

#     Response:
#         Format --> [HEADER: u8] [ERROR_CODE: u8] [OP_CODE:u8] [RESPONSE]

#     Valid Onboard LED = 0x19 --> PIN_25
# */

- command: turn_on_led
  op: 1
  args: {led_id: i32}
  ret: {}
  
- command: turn_off_led
  op: 2
  args: {led_id: i32}
  ret: {}

- command: get_led_status
  op: 3
  args: {led_id: i32}
  ret: {status: u8}
